# https://taskfile.dev/docs/reference/schema
version: "3"

vars:
  KEY: ""

tasks:
  default:
    cmds:
      - task -l

  # ── Helpers ──────────────────────────────────────────────────────────────

  ensure-instance:
    internal: true
    desc: Verify a MinecraftServer EC2 instance exists (any non-terminated state)
    cmds:
      - bash scripts/get-instance-id.sh > /dev/null

  ensure-bucket:
    internal: true
    desc: Verify the MinecraftBucket stack exists and has a BucketName output
    cmds:
      - bash scripts/get-bucket-name.sh > /dev/null

  bootstrap:
    internal: true
    desc: Bootstrap CDK project
    sources:
      - bin/app.ts
    cmds:
      - npx cdk bootstrap

  install:
    internal: true
    desc: Install project dependencies
    sources:
      - package.json
      - package-lock.json
    cmds:
      - npm i

  # ── Setup ─────────────────────────────────────────────────────────────────

  setup:
    desc: Install and bootstrap CDK project
    cmds:
      - task: install
      - task: bootstrap

  # ── Deploy ────────────────────────────────────────────────────────────────

  deploy:
    desc: "Full deploy: bucket stack → upload mods/config → server stack → status"
    cmds:
      - task: deploy-bucket
      - task: upload-mods
      - task: deploy-instance
      - task: deploy-api
      - task: status

  deploy-bucket:
    internal: true
    desc: Deploy the MinecraftBucket stack (S3 bucket)
    cmds:
      - bash scripts/deploy-bucket.sh{{if .CLI_ARGS}} {{.CLI_ARGS}}{{end}}

  deploy-instance:
    internal: true
    desc: Deploy the MinecraftServer stack (EC2, networking, DNS)
    cmds:
      - bash scripts/deploy-instance.sh{{if .CLI_ARGS}} {{.CLI_ARGS}}{{end}}

  deploy-api:
    internal: true
    desc: Deploy the MinecraftApi stack (API Gateway, Lambda)
    cmds:
      - bash scripts/deploy-api.sh{{if .CLI_ARGS}} {{.CLI_ARGS}}{{end}}

  destroy:
    desc: Destroy MinecraftServer + MinecraftBucket stacks (interactive confirm; deletes all resources)
    cmds:
      - bash scripts/destroy.sh{{if .CLI_ARGS}} {{.CLI_ARGS}}{{end}}
      # clear the Taskfile cache
      - rm -f .task/checksum/upload-mods

  # ── Mods / Config ─────────────────────────────────────────────────────────

  upload-mods:
    desc: Upload server config and sync mods to S3
    vars:
      BUCKET_NAME:
        sh: bash scripts/get-bucket-name.sh
    sources:
      - scripts/upload-mods.sh
      - ./mods/*.jar
      - ./server-config/**/*
      - ./mods-config/**/*
    cmds:
      - bash scripts/upload-mods.sh {{.BUCKET_NAME}}

  sync-mods:
    desc: Upload mods to S3, sync to running EC2 instance, and restart the server (no SSH needed)
    vars:
      INSTANCE_ID:
        sh: bash scripts/get-instance-id.sh
      BUCKET_NAME:
        sh: bash scripts/get-bucket-name.sh
    cmds:
      - bash scripts/upload-mods.sh {{.BUCKET_NAME}}
      - bash scripts/sync-mods.sh {{.INSTANCE_ID}} {{.BUCKET_NAME}}

  # ── Instance lifecycle ────────────────────────────────────────────────────

  start-server:
    desc: Start the EC2 instance (shows status after)
    cmds:
      - bash scripts/start-server.sh

  stop-server:
    desc: Stop the EC2 instance (EBS preserved)
    cmds:
      - bash scripts/stop-server.sh

  # ── Observe ───────────────────────────────────────────────────────────────

  status:
    desc: Show stack, instance, bucket, and server address
    cmds:
      - bash scripts/status.sh

  ssm:
    desc: "Run a shell command on the EC2 instance via SSM (e.g. task ssm -- 'df -h')"
    vars:
      INSTANCE_ID:
        sh: bash scripts/get-instance-id.sh
    cmds:
      - bash scripts/ssm.sh {{.INSTANCE_ID}} {{.CLI_ARGS}}

  rcon:
    desc: "Run an RCON command on the Minecraft server (e.g. task rcon -- 'op username')"
    vars:
      INSTANCE_ID:
        sh: bash scripts/get-instance-id.sh
    cmds:
      - bash scripts/rcon.sh {{.INSTANCE_ID}} {{.CLI_ARGS}}

  # ── Maintenance ───────────────────────────────────────────────────────────

  reset-world:
    desc: "Delete world folders on the running instance and restart the server (interactive confirm)"
    vars:
      INSTANCE_ID:
        sh: bash scripts/get-instance-id.sh
    cmds:
      - bash scripts/reset-world.sh {{.INSTANCE_ID}}

  cleanup-orphans:
    desc: "List EC2 orphans (same Name tag, not stack InstanceId); task cleanup-orphans -- --execute"
    cmds:
      - bash scripts/cleanup-orphan-instances.sh{{if .CLI_ARGS}} {{.CLI_ARGS}}{{end}}

  register-discord-commands:
    desc: Register /start /stop /status slash commands with Discord (run once after creating the app)
    cmds:
      - npx ts-node --prefer-ts-exts discord/register-commands.ts
