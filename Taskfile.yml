# https://taskfile.dev/docs/reference/schema
version: "3"

vars:
  KEY: ""

tasks:
  default:
    cmds:
      - task -l

  # ── Helpers ──────────────────────────────────────────────────────────────

  ensure-instance:
    internal: true
    desc: Verify a MinecraftServer EC2 instance exists (any non-terminated state)
    cmds:
      - bash scripts/get-instance-id.sh > /dev/null

  ensure-bucket:
    internal: true
    desc: Verify the MinecraftBucket stack exists and has a BucketName output
    cmds:
      - bash scripts/get-bucket-name.sh > /dev/null

  bootstrap:
    internal: true
    desc: Bootstrap CDK project
    sources:
      - app.ts
    cmds:
      - npx cdk bootstrap

  install:
    internal: true
    desc: Install project dependencies
    sources:
      - package.json
      - package-lock.json
    cmds:
      - npm i

  # ── Setup ─────────────────────────────────────────────────────────────────

  setup:
    desc: Install and bootstrap CDK project
    cmds:
      - task: install
      - task: bootstrap

  # ── Deploy ────────────────────────────────────────────────────────────────

  deploy:
    desc: "Full deploy: bucket stack → upload mods/config → server stack → status"
    cmds:
      - task: deploy-bucket
      - task: upload-mods
      - task: deploy-instance
      - task: status

  deploy-bucket:
    desc: Deploy the MinecraftBucket stack (S3 bucket)
    cmds:
      - bash scripts/deploy-bucket.sh{{if .CLI_ARGS}} {{.CLI_ARGS}}{{end}}

  deploy-instance:
    desc: Deploy the MinecraftServer stack (EC2, networking, DNS)
    cmds:
      - bash scripts/deploy-instance.sh{{if .CLI_ARGS}} {{.CLI_ARGS}}{{end}}

  destroy:
    desc: Destroy MinecraftServer + MinecraftBucket stacks (interactive confirm; deletes all resources)
    cmds:
      - bash scripts/destroy.sh{{if .CLI_ARGS}} {{.CLI_ARGS}}{{end}}

  # ── Mods / Config ─────────────────────────────────────────────────────────

  upload-mods:
    desc: Upload server config and sync mods to S3
    vars:
      BUCKET_NAME:
        sh: bash scripts/get-bucket-name.sh
    sources:
      - scripts/upload-mods.sh
      - ./mods/*.jar
    cmds:
      - bash scripts/upload-mods.sh {{.BUCKET_NAME}}

  sync-mods:
    desc: Upload mods to S3, sync to running EC2 instance, and restart the server (no SSH needed)
    vars:
      INSTANCE_ID:
        sh: bash scripts/get-instance-id.sh
      BUCKET_NAME:
        sh: bash scripts/get-bucket-name.sh
    cmds:
      - bash scripts/upload-mods.sh {{.BUCKET_NAME}}
      - bash scripts/sync-mods.sh {{.INSTANCE_ID}} {{.BUCKET_NAME}}

  # ── Instance lifecycle ────────────────────────────────────────────────────

  start-server:
    desc: Start the EC2 instance (shows status after)
    vars:
      INSTANCE_ID:
        sh: bash scripts/get-instance-id.sh
    cmds:
      - bash scripts/start-server.sh {{.INSTANCE_ID}}
      - task: status

  stop-server:
    desc: Stop the EC2 instance (EBS preserved)
    vars:
      INSTANCE_ID:
        sh: bash scripts/get-instance-id.sh
    cmds:
      - bash scripts/stop-server.sh {{.INSTANCE_ID}}

  # ── Observe ───────────────────────────────────────────────────────────────

  status:
    desc: Show stack, instance, bucket, and server address
    vars:
      INSTANCE_ID:
        sh: bash scripts/get-instance-id.sh
      BUCKET_NAME:
        sh: bash scripts/get-bucket-name.sh
    cmds:
      - bash scripts/status.sh {{.INSTANCE_ID}} {{.BUCKET_NAME}}

  logs:
    desc: "Tail all Minecraft log streams in parallel (add -- --follow to stream)"
    cmds:
      - bash scripts/logs.sh{{if .CLI_ARGS}} {{.CLI_ARGS}}{{end}}

  logs:*:
    desc: "Tail a specific log stream: boot, setup, or server (add -- --follow to stream)"
    vars:
      SOURCE: "{{index .MATCH 0}}"
    cmds:
      - bash scripts/logs.sh {{.SOURCE}}{{if .CLI_ARGS}} {{.CLI_ARGS}}{{end}}

  ssh:
    desc: "SSH to ec2-user@public IP (optional: task ssh KEY=~/.ssh/key.pem)"
    vars:
      INSTANCE_ID:
        sh: bash scripts/get-instance-id.sh
    cmds:
      - bash scripts/ssh.sh {{.INSTANCE_ID}}{{if ne .KEY ""}} {{.KEY | shellQuote}}{{end}}

  # ── Maintenance ───────────────────────────────────────────────────────────

  cleanup-orphans:
    desc: "List EC2 orphans (same Name tag, not stack InstanceId); task cleanup-orphans -- --execute"
    cmds:
      - bash scripts/cleanup-orphan-instances.sh{{if .CLI_ARGS}} {{.CLI_ARGS}}{{end}}

  render-user-data:
    desc: Expand lib user-data templates for local inspection (pass flags after --)
    cmds:
      - npx ts-node --prefer-ts-exts scripts/render-user-data.ts{{if .CLI_ARGS}} {{.CLI_ARGS}}{{end}}
